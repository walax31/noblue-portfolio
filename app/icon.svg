<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="black"/>
  <text x="12" y="42"
        font-size="28"
        fill="#4ade80"
        font-family="monospace"
        filter="url(#glow)">
    >_
  </text>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
